name: Nightly (full-stack e2e)

# Heavy, Docker-dependent suites that are too slow for every PR: the live
# security e2e (test/e2e/e2e.sh) and the docker-tagged report suite.
# Runs nightly and on manual dispatch. Failures here are real regressions in the
# end-to-end security invariants (L0 egress, metadata block, kill cascade,
# brokered credentials, recording delivery).

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
      - name: Docker available
        run: docker --version
      - name: Live security e2e (compose stack)
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-e2e
      - name: Upload e2e results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-live-results
          path: test/e2e/RESULTS.md

  # Live TASK e2e: real sandboxes run the test/e2e/tasks corpus and are graded on
  # final workspace STATE (did the agent actually do the work?), plus per-tier
  # allow/block confinement, interactive PTY, and recording-replay. The $0 oracle
  # lane only (no model): the real-model lane is opt-in and needs a subscription/
  # key not available in CI. On native docker the proxy->control-plane egress
  # callback routes, so the recording-replay synthesis allowlist is populated too.
  task-e2e-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Docker available
        run: docker --version
      - name: Live task e2e (real sandboxes + graders, oracle lane)
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-e2e-live
      - name: Upload e2e results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: task-e2e-live-results
          path: test/e2e/RESULTS.md

  # CI-mode dogfood: the exact flow docs/ci/github-actions.yml tells users to
  # run — scripts/ci-run.sh brings up a fresh control plane, launches ONE
  # governed BYOA run (stock ubuntu, task_mode exec, sealed ci.json policy),
  # waits, collects artifacts, tears down. Also asserts exit-code propagation:
  # a task that exits 3 must fail the script with exit 3.
  ci-mode-dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Docker available
        run: docker --version
      - name: One-shot governed run (BYOA exec mode, sealed policy)
        env:
          WARDYN_CI_IMAGE: ubuntu:24.04
          WARDYN_CI_TASK_MODE: exec
          WARDYN_CI_TASK: "echo hello from a governed sandbox && uname -a"
          WARDYN_CI_OUT: ${{ github.workspace }}/ci-artifacts
        run: scripts/ci-run.sh
      - name: Exit-code propagation (task exit 3 -> script exit 3)
        env:
          WARDYN_CI_IMAGE: ubuntu:24.04
          WARDYN_CI_TASK_MODE: exec
          WARDYN_CI_TASK: "exit 3"
          WARDYN_CI_OUT: ${{ github.workspace }}/ci-artifacts-negative
          WARDYN_CI_SKIP_BUILD: "1"
        run: |
          set +e
          scripts/ci-run.sh
          code=$?
          set -e
          [ "$code" -eq 3 ] || { echo "expected exit 3, got $code"; exit 1; }
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-mode-dogfood-artifacts
          path: |
            ci-artifacts/
            ci-artifacts-negative/

  # Real-Docker envbuild/runner smoke test (the "E" / envbuild workstream).
  # The PR-time ci.yml `build` job already runs `make test-report-docker` (via
  # cover-check) with WARDYN_TEST_DOCKER unset, so its real-Docker-gated cases
  # skip. This job is the non-duplicate half: it sets WARDYN_TEST_DOCKER=1 so
  # those cases (internal/runner/docker network/integration tests,
  # internal/envbuild's integration_test.go) actually exercise a live daemon.
  docker-tagged-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
      - name: Docker available
        run: docker --version
      - name: docker-tagged suite with reports (real Docker; WARDYN_TEST_DOCKER=1)
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-report-docker
      - name: Upload docker-tagged test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-tagged-live-reports
          path: test/reports/go/docker/**
