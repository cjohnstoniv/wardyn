name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build
        run: go build ./...
      # The production Docker runner lives behind //go:build docker. Compile and
      # vet it in CI too, otherwise the entire runner/docker + envbuild tree can
      # rot uncaught (was a HIGH finding: CI only ever built default tags).
      - name: Build (docker tags)
        run: go build -tags docker ./...
      - name: Vet
        run: go vet ./... && go vet -tags docker ./...
      - name: Test (detailed reports + coverage) and enforce the coverage floor
        run: make cover-check
      - name: Upload Go test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-reports
          path: test/reports/go/**

  # ── web UI: typecheck + unit/component tests + build ──────────────────────
  # The React admin UI previously had ZERO CI coverage (a HIGH finding). This
  # job typechecks (tsc was entirely broken before), runs vitest with coverage,
  # and builds the embedded bundle.
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps (puppeteer chromium download skipped; the runner's chrome is used)
        working-directory: ui
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile
      - name: Diagram gate (mermaid syntax + label-truth)
        run: ./scripts/check-diagrams.sh

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: ui
        run: pnpm typecheck
      - name: Unit/component tests (vitest + coverage)
        working-directory: ui
        run: pnpm test:coverage
      - name: Build UI bundle
        working-directory: ui
        run: pnpm build
      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: test/reports/ui/**

  # ── web UI: Playwright e2e against a seeded none-runner backend ────────────
  # Real wardynd + Postgres + the `none` runner serving the built UI, seeded with
  # deterministic fixtures. Each spec runs against a freshly-seeded backend
  # (scripts/run-ui-e2e.sh) so mutating specs never contaminate each other. The
  # full live compose stack is exercised by the nightly workflow instead.
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Start Postgres (named container so the seeder can psql into it)
        run: |
          docker run -d --name wardyn-test-pg \
            -e POSTGRES_PASSWORD=wardyn -e POSTGRES_USER=wardyn -e POSTGRES_DB=wardyn \
            -p 55432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec wardyn-test-pg pg_isready -U wardyn && break || sleep 1
          done
      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright UI e2e (fresh seed per spec)
        run: ./scripts/run-ui-e2e.sh
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ui/playwright-report/**
            ui/test-results/**

  # ── deploy: Helm chart lint + render ──────────────────────────────────────
  # The Helm chart is one of the two blessed deploy paths; lint + template-render
  # it so it can never regress to "renders nothing" again (was a CRITICAL gap).
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: helm lint
        run: helm lint ./deploy/helm/wardyn
      - name: helm template (must render objects)
        run: |
          out=$(helm template wardyn ./deploy/helm/wardyn)
          echo "$out" | grep -q "kind: Deployment" || { echo "chart rendered no Deployment"; exit 1; }
          echo "$out" | grep -q "kind: Service" || { echo "chart rendered no Service"; exit 1; }

  # ── deploy: docker-compose config validation ──────────────────────────────
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (validate)
        run: docker compose -f deploy/compose/docker-compose.yaml config >/dev/null

  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [docker, conformance-stub]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # ── docker conformance ──────────────────────────────────────────────────
      - name: Set up Docker (for docker target)
        if: matrix.target == 'docker'
        run: docker --version

      - name: Run conformance tests (docker)
        if: matrix.target == 'docker'
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-conformance-docker
        # No continue-on-error: a real conformance failure must block the build.

      # ── driver-agnostic conformance stub ────────────────────────────────────
      # There is no Kubernetes runner driver yet (v0.5 — planned). The `none`
      # honesty stub validates the driver-agnostic contract (honest-empty
      # capabilities; a driver must never silently downgrade confinement) and
      # always runs without any cluster dependency.
      - name: Run conformance tests (stub)
        if: matrix.target == 'conformance-stub'
        run: make test-conformance-stub
        # No continue-on-error: the stub contract tests must always pass.

  # ── supply-chain: vulnerability scanning ──────────────────────────────────
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # ── supply-chain: static analysis ─────────────────────────────────────────
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  # ── supply-chain: DCO sign-off ─────────────────────────────────────────────
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so all commits in the PR are visible.
          fetch-depth: 0
      - name: Check DCO sign-off (Signed-off-by on all commits)
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          if [ -z "$BASE" ]; then
            # On push to main, just check HEAD commit.
            COMMITS=$(git log -1 --format='%H')
          else
            COMMITS=$(git log "$BASE"..HEAD --format='%H')
          fi
          MISSING=0
          for sha in $COMMITS; do
            msg=$(git log -1 --format='%B' "$sha")
            if ! echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "MISSING Signed-off-by in commit $sha:"
              echo "$msg" | head -3
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING commit(s) lack a Signed-off-by trailer."
            echo "Add it with: git commit --signoff (or git commit -s)"
            exit 1
          fi
          echo "All commits carry Signed-off-by. DCO check passed."

  # ── supply-chain: secret scanning ────────────────────────────────────────
  # Wardyn mints credentials; a committed secret is a critical supply-chain risk.
  # Full history is scanned so secrets introduced in any commit are caught.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── supply-chain: dependency license gate ─────────────────────────────────
  # Forbid copyleft / non-permissive Go dependencies.
  # The tree is currently all-permissive; this job enforces that invariant.
  # asciinema is a subprocess tool, not a Go dep, so it is not checked here.
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - name: Check dependency licenses
        run: go-licenses check --disallowed_types=forbidden,restricted ./...

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install addlicense
        run: go install github.com/google/addlicense@v1.1.1
      - name: Check SPDX headers on source files
        run: ./scripts/check-license-headers.sh

  # ── supply-chain: SBOM + cosign (release stub) ────────────────────────────
  # This job is a clearly-marked stub. It produces a CycloneDX SBOM via syft
  # and shows where cosign signing would go in a real release pipeline.
  # It only runs on push to main (not on PRs) and does NOT upload to a registry.
  # Wire a real release workflow here when release automation is ready (v0.5).
  sbom-stub:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install syft (SBOM generator)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Generate SBOM (CycloneDX JSON)
        run: syft . -o cyclonedx-json > wardyn-sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wardyn-sbom
          path: wardyn-sbom.cdx.json
      # STUB: cosign signing goes here once a release key / keyless OIDC
      # identity is configured. Example:
      #   cosign sign-blob --yes wardyn-sbom.cdx.json
      - name: STUB — cosign signing not yet wired
        run: echo "SBOM generated. cosign signing is a v0.5 release-pipeline task."
