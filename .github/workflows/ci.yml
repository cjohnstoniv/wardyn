name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege default: CI only needs to read the repo. The gitleaks job gets
# its token via the step env; nothing here writes back. Mirrors nightly.yml, which
# already sets this — closing the ci.yml inconsistency (U092).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Build
        run: go build ./...
      # The production Docker runner lives behind //go:build docker. Compile and
      # vet it in CI too, otherwise the entire runner/docker + envbuild tree can
      # rot uncaught (was a HIGH finding: CI only ever built default tags).
      - name: Build (docker tags)
        run: go build -tags docker ./...
      - name: Vet
        run: go vet ./... && go vet -tags docker ./...
      - name: Test (detailed reports + coverage) and enforce the coverage floor
        run: make cover-check
      # The concurrent kill/dispatch FSM tests (kill_dispatch_race_test.go) are
      # only meaningful under the race detector; the rest of the tree rides along.
      - name: Test (race detector)
        run: make test-race
      - name: Upload Go test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-reports
          path: test/reports/go/**

  # ── web UI: typecheck + unit/component tests + build ──────────────────────
  # The React admin UI previously had ZERO CI coverage (a HIGH finding). This
  # job typechecks (tsc was entirely broken before), runs vitest with coverage,
  # and builds the embedded bundle.
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps (puppeteer chromium download skipped; the runner's chrome is used)
        working-directory: ui
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile
      - name: Diagram gate (mermaid syntax + label-truth)
        run: ./scripts/check-diagrams.sh

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      # Fail closed on a copyleft license in a SHIPPED (prod) dependency. The
      # known MPL/EPL hits (lightningcss, elkjs, dompurify) are devDependencies
      # and are excluded by --prod, so they do not trip this gate.
      - name: Check UI production dependency licenses (no copyleft)
        working-directory: ui
        run: |
          set -euo pipefail
          pnpm licenses list --prod --json > /tmp/ui-prod-licenses.json
          # GPL/AGPL/LGPL/MPL/EPL require source disclosure / relicensing on
          # distribution. A dual-licensed "X OR Apache-2.0" still fails closed
          # here — we don't assume the OR resolves in our favor without review.
          bad=$(jq -r 'keys[]' /tmp/ui-prod-licenses.json \
            | grep -Ei '(^|[^A-Za-z])(A?GPL|LGPL|MPL|EPL)([-0-9]|$)' || true)
          if [ -n "$bad" ]; then
            echo "Copyleft license(s) found in PRODUCTION dependencies:"
            echo "$bad"
            jq . /tmp/ui-prod-licenses.json
            exit 1
          fi
          echo "No copyleft licenses in production dependencies."
      - name: Typecheck
        working-directory: ui
        run: pnpm typecheck
      - name: Unit/component tests (vitest + coverage)
        working-directory: ui
        run: pnpm test:coverage
      - name: Build UI bundle
        working-directory: ui
        run: pnpm build
      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-reports
          path: test/reports/ui/**

  # ── web UI: Playwright e2e against a seeded none-runner backend ────────────
  # Real wardynd + Postgres + the `none` runner serving the built UI, seeded with
  # deterministic fixtures. Each spec runs against a freshly-seeded backend
  # (scripts/run-ui-e2e.sh) so mutating specs never contaminate each other. The
  # full live compose stack is exercised by the nightly workflow instead.
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Start Postgres (named container so the seeder can psql into it)
        run: |
          docker run -d --name wardyn-test-pg \
            -e POSTGRES_PASSWORD=wardyn -e POSTGRES_USER=wardyn -e POSTGRES_DB=wardyn \
            -p 55432:5432 postgres:17
          for i in $(seq 1 30); do
            docker exec wardyn-test-pg pg_isready -U wardyn && break || sleep 1
          done
      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright UI e2e (fresh seed per spec)
        run: ./scripts/run-ui-e2e.sh
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            ui/playwright-report/**
            ui/test-results/**

  # ── deploy: Helm chart lint + render ──────────────────────────────────────
  # The Helm chart is one of the two blessed deploy paths; lint + template-render
  # it so it can never regress to "renders nothing" again (was a CRITICAL gap).
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: helm lint
        run: helm lint ./deploy/helm/wardyn
      - name: helm template (must render objects)
        run: |
          out=$(helm template wardyn ./deploy/helm/wardyn)
          echo "$out" | grep -q "kind: Deployment" || { echo "chart rendered no Deployment"; exit 1; }
          echo "$out" | grep -q "kind: Service" || { echo "chart rendered no Service"; exit 1; }
          echo "$out" | grep -q "kind: NetworkPolicy" || { echo "chart rendered no NetworkPolicy (default-on L0 egress control)"; exit 1; }
          echo "$out" | grep -q "runAsNonRoot: true" || { echo "chart rendered no runAsNonRoot: true securityContext"; exit 1; }
          echo "$out" | grep -q "readOnlyRootFilesystem: true" || { echo "chart rendered no readOnlyRootFilesystem: true securityContext"; exit 1; }

  # ── deploy: docker-compose config validation ──────────────────────────────
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (validate)
        run: docker compose -f deploy/compose/docker-compose.yaml config >/dev/null

  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [docker, conformance-stub]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      # ── docker conformance ──────────────────────────────────────────────────
      - name: Docker smoke check (for docker target)
        if: matrix.target == 'docker'
        run: docker run --rm hello-world

      - name: Run conformance tests (docker)
        if: matrix.target == 'docker'
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-conformance-docker
        # No continue-on-error: a real conformance failure must block the build.

      # ── driver-agnostic conformance stub ────────────────────────────────────
      # There is no Kubernetes runner driver yet (v0.5 — planned). The `none`
      # honesty stub validates the driver-agnostic contract (honest-empty
      # capabilities; a driver must never silently downgrade confinement) and
      # always runs without any cluster dependency.
      - name: Run conformance tests (stub)
        if: matrix.target == 'conformance-stub'
        run: make test-conformance-stub
        # No continue-on-error: the stub contract tests must always pass.

  # ── docker-tagged tests (fakeDocker; no real Docker daemon needed) ────────
  # Proves confinement/egress invariants using the fake Docker client. This ran
  # in NO per-PR workflow before (a HIGH finding) — only plain `go build/vet
  # -tags docker` touched this tree, never the actual docker-tagged tests.
  # WARDYN_TEST_DOCKER is deliberately left unset: the real-Docker-gated cases
  # skip cleanly, leaving the fakeDocker-backed tests to run here.
  test-docker-tagged:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: docker-tagged suite with reports (fakeDocker; no real daemon needed)
        run: make test-report-docker
      - name: Upload docker-tagged test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-test-reports
          path: test/reports/go/docker/**

  # ── Postgres-backed invariant proofs (approval-mint + audit invariants) ───
  # Runs the WARDYN_TEST_PG-gated suite (store/db/secretstore/broker/api +
  # test/apie2e) against a real Postgres. This ran in NO per-PR workflow
  # before (a HIGH finding) — only the nightly `integration-pg` job exercised
  # it. Mirrors that job's postgres service (postgres:17, matching compose/prod).
  test-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: wardyn
          POSTGRES_DB: wardyn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Postgres-gated integration suite (with reports)
        env:
          WARDYN_TEST_PG: postgres://postgres:wardyn@localhost:5432/wardyn?sslmode=disable
        run: make test-report-pg
      - name: Upload PG test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pg-test-reports
          path: test/reports/go/pg/**

  # ── supply-chain: vulnerability scanning ──────────────────────────────────
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      # Also scan the ACTUAL shipped build: wardynd ships with -tags docker
      # (Dockerfile.wardynd), whose runner/docker + envbuild tree is invisible to
      # the tagless scan above. This is where the moby-module CVEs lived; the v29
      # migration cleared them, so this is now green and must stay green (U024).
      - name: Run govulncheck (-tags docker, the shipped build)
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 -tags docker ./...

  # ── supply-chain: static analysis ─────────────────────────────────────────
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      # Lint the -tags docker tree too (the shipped runner/docker + envbuild code),
      # otherwise it never gets a static-analysis pass in CI (U024/U112).
      - name: Run staticcheck (-tags docker)
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 -tags docker ./...

  # ── supply-chain: DCO sign-off ─────────────────────────────────────────────
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so all commits in the PR are visible.
          fetch-depth: 0
      - name: Check DCO sign-off (Signed-off-by on all commits)
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          if [ -z "$BASE" ]; then
            # On push to main, just check HEAD commit. --no-merges keeps this
            # consistent with the PR branch below (see next comment).
            COMMITS=$(git log -1 --no-merges --format='%H')
          else
            # checkout@v4 on pull_request lands on the ephemeral auto-generated
            # merge commit, whose message has no Signed-off-by. --no-merges
            # excludes that synthetic commit so only real contributor commits
            # are checked (otherwise DCO fails on essentially every PR).
            COMMITS=$(git log --no-merges "$BASE"..HEAD --format='%H')
          fi
          MISSING=0
          for sha in $COMMITS; do
            msg=$(git log -1 --format='%B' "$sha")
            if ! echo "$msg" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "MISSING Signed-off-by in commit $sha:"
              echo "$msg" | head -3
              MISSING=$((MISSING+1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING commit(s) lack a Signed-off-by trailer."
            echo "Add it with: git commit --signoff (or git commit -s)"
            exit 1
          fi
          echo "All commits carry Signed-off-by. DCO check passed."

  # ── supply-chain: secret scanning ────────────────────────────────────────
  # Wardyn mints credentials; a committed secret is a critical supply-chain risk.
  # Full history is scanned so secrets introduced in any commit are caught. This
  # runs the gitleaks CLI directly via `gitleaks git` (NOT gitleaks-action): the
  # action's default scan range is only the triggering push/PR's diff even with
  # fetch-depth:0, which silently made the "full history" claim above false —
  # do not swap back to the action without also fixing its scan range. Accepted
  # test/dev-fixture secrets are allowlisted by commit fingerprint in
  # .gitleaksignore (gitleaks' native mechanism), not by broad path/regex.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Scan full git history for secrets with gitleaks
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 git -c .gitleaks.toml -v

  # ── supply-chain: dependency license gate ─────────────────────────────────
  # Forbid copyleft / non-permissive Go dependencies.
  # The tree is currently all-permissive; this job enforces that invariant.
  # asciinema is a subprocess tool, not a Go dep, so it is not checked here.
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - name: Check dependency licenses
        run: go-licenses check --disallowed_types=forbidden,restricted ./...
      # go-licenses has no -tags flag, so the docker-tagged deps (moby/moby/*,
      # containerd/errdefs) were never license-scanned; drive the tag via GOFLAGS
      # so the shipped build's transitive licenses are covered too (U112).
      - name: Check dependency licenses (-tags docker)
        run: GOFLAGS=-tags=docker go-licenses check --disallowed_types=forbidden,restricted ./...

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Check SPDX headers on source files
        run: ./scripts/check-license-headers.sh

  # ── supply-chain: SBOM + cosign (release stub) ────────────────────────────
  # This job is a clearly-marked stub. It produces a CycloneDX SBOM via syft
  # and shows where cosign signing would go in a real release pipeline.
  # It only runs on push to main (not on PRs) and does NOT upload to a registry.
  # Wire a real release workflow here when release automation is ready (v0.5).
  sbom-stub:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install syft (SBOM generator)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/v1.46.0/install.sh \
            | sh -s -- -b /usr/local/bin v1.46.0
      - name: Generate SBOM (CycloneDX JSON)
        run: syft . -o cyclonedx-json > wardyn-sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wardyn-sbom
          path: wardyn-sbom.cdx.json
      # STUB: cosign signing goes here once a release key / keyless OIDC
      # identity is configured. Example:
      #   cosign sign-blob --yes wardyn-sbom.cdx.json
      - name: STUB — cosign signing not yet wired
        run: echo "SBOM generated. cosign signing is a v0.5 release-pipeline task."
