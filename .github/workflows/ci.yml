name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege default: CI only needs to read the repo. The gitleaks job gets
# its token via the step env; nothing here writes back. Mirrors nightly.yml, which
# already sets this — closing the ci.yml inconsistency (U092).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Build
        run: make build
      # The production Docker runner lives behind //go:build docker. Compile and
      # vet it in CI too, otherwise the entire runner/docker + envbuild tree can
      # rot uncaught (was a HIGH finding: CI only ever built default tags).
      - name: Build (docker tags)
        run: make build-docker
      # `make lint` = go vet (both tag sets) + the golangci-lint function-size/
      # complexity gate (.golangci.yml: funlen/gocyclo/gocognit/lll) + the
      # file-size gate (scripts/check-file-size.sh). Single-sourced in the
      # Makefile — the tool version pin lives there (GOLANGCI_LINT_VERSION).
      - name: Lint (vet + size/complexity gates)
        run: make lint
      # Runs the suite under BOTH tag sets and enforces the floor on the union of
      # the two coverage profiles. The tagless build alone cannot compile the
      # container-hardening driver or internal/envbuild, so a tagless-only floor
      # scored code that is not what ships.
      #
      # cover-check == test-report + test-report-docker, so this IS the PR-time
      # docker-tagged suite (fakeDocker; WARDYN_TEST_DOCKER deliberately unset, so
      # the real-daemon cases skip cleanly). A separate test-docker-tagged job used
      # to run `make test-report-docker` a second time on its own runner — same
      # command, same env, reports already inside the upload below. Removed as a
      # true duplicate; nightly.yml's docker-tagged-live is the one that is NOT a
      # duplicate (it sets WARDYN_TEST_DOCKER=1 against a live daemon).
      - name: Test both tag sets (detailed reports + coverage) and enforce the union coverage floor
        run: make cover-check
      # The concurrent kill/dispatch FSM tests (kill_dispatch_race_test.go) are
      # only meaningful under the race detector; the rest of the tree rides along.
      # `make test-race` runs the sweep under BOTH tag sets — the second pass
      # (-tags docker) is the only race coverage the concurrency-heavy sandbox
      # lifecycle (runner/docker, envbuild) gets; it needs no daemon.
      - name: Test (race detector, both tag sets)
        run: make test-race
      # Covers every Go suite this job produced: unit/, docker/ (the -tags docker
      # suite, via cover-check) and union/ (the coverage floor's merged profile).
      - name: Upload Go test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-test-reports
          path: test/reports/go/**

  # ── web UI: typecheck + unit/component tests + build ──────────────────────
  # The React admin UI previously had ZERO CI coverage (a HIGH finding). This
  # job typechecks (tsc was entirely broken before), runs vitest with coverage,
  # and builds the embedded bundle.
  diagrams:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps (puppeteer chromium download skipped; the runner's chrome is used)
        working-directory: ui
        env:
          PUPPETEER_SKIP_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile
      - name: Diagram gate (mermaid syntax + label-truth)
        run: ./scripts/check-diagrams.sh

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      # Fail closed on a copyleft license in a SHIPPED (prod) dependency. The
      # known MPL/EPL hits (lightningcss, elkjs, dompurify) are devDependencies
      # and are excluded by --prod, so they do not trip this gate.
      - name: Check UI production dependency licenses (no copyleft)
        run: make npm-license
      - name: Typecheck
        working-directory: ui
        run: pnpm typecheck
      - name: Unit/component tests (vitest + coverage)
        working-directory: ui
        run: pnpm test:coverage
      - name: Build UI bundle
        working-directory: ui
        run: pnpm build
      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-reports
          path: test/reports/ui/**

  # ── web UI: Playwright e2e against a seeded none-runner backend ────────────
  # Real wardynd + Postgres + the `none` runner serving the built UI, seeded with
  # deterministic fixtures. Each spec runs against a freshly-seeded backend
  # (scripts/run-ui-e2e.sh) so mutating specs never contaminate each other. The
  # full live compose stack is exercised by the nightly workflow instead.
  ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Start Postgres (named container so the seeder can psql into it)
        run: |
          docker run -d --name wardyn-test-pg \
            -e POSTGRES_PASSWORD=wardyn -e POSTGRES_USER=wardyn -e POSTGRES_DB=wardyn \
            -p 55432:5432 postgres:17
          for i in $(seq 1 30); do
            docker exec wardyn-test-pg pg_isready -U wardyn && break || sleep 1
          done
      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright UI e2e (fresh seed per spec)
        run: ./scripts/run-ui-e2e.sh
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            ui/playwright-report/**
            ui/test-results/**

  # ── deploy: Helm chart lint + render ──────────────────────────────────────
  # The Helm chart is one of the two blessed deploy paths; lint + template-render
  # it so it can never regress to "renders nothing" again (was a CRITICAL gap).
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: helm lint + template (must render load-bearing objects)
        run: make helm-lint

  # ── deploy: docker-compose config validation ──────────────────────────────
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (validate)
        run: make compose-config

  # Docker conformance against the live daemon (WARDYN_TEST_DOCKER=1). The
  # driver-agnostic honesty stub (`make test-conformance-stub` → the untagged
  # test/conformance/none_test.go) is NOT a separate leg here: that file carries
  # no build tag, so the build job's `make cover-check` already runs it under
  # both tag sets and `make test-race` runs it again — a third CI run would be a
  # pure duplicate. The stub target stays in the Makefile for local use.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Docker smoke check
        run: docker run --rm hello-world
      - name: Run conformance tests (docker)
        env:
          WARDYN_TEST_DOCKER: "1"
        run: make test-conformance-docker
        # No continue-on-error: a real conformance failure must block the build.

  # ── Postgres-backed invariant proofs (approval-mint + audit invariants) ───
  # Runs the WARDYN_TEST_PG-gated suite (store/db/secretstore/broker/api +
  # test/apie2e) against a real Postgres. This ran in NO per-PR workflow
  # before (a HIGH finding) — only the nightly `integration-pg` job exercised
  # it. Mirrors that job's postgres service (postgres:17, matching compose/prod).
  test-pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: wardyn
          POSTGRES_DB: wardyn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Postgres-gated integration suite (with reports)
        env:
          WARDYN_TEST_PG: postgres://postgres:wardyn@localhost:5432/wardyn?sslmode=disable
        run: make test-report-pg
      - name: Upload PG test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pg-test-reports
          path: test/reports/go/pg/**

  # ── supply-chain: vulnerability scanning ──────────────────────────────────
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      # Scans BOTH the tagless build and the ACTUAL shipped build (-tags docker,
      # Dockerfile.wardynd), whose runner/docker + envbuild tree is invisible to
      # a tagless-only scan. This is where the moby-module CVEs lived; the v29
      # migration cleared them, so this is now green and must stay green (U024).
      - name: Run govulncheck (tagless + -tags docker)
        run: make govulncheck

  # ── supply-chain: static analysis ─────────────────────────────────────────
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      # Lints BOTH tag sets — including the -tags docker tree (the shipped
      # runner/docker + envbuild code), which otherwise never gets a
      # static-analysis pass in CI (U024/U112).
      - name: Run staticcheck (tagless + -tags docker)
        run: make staticcheck

  # ── supply-chain: DCO sign-off ─────────────────────────────────────────────
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so all commits in the PR are visible.
          fetch-depth: 0
      # The commit-range selection stays here (it depends on the GH event); the
      # per-commit Signed-off-by check lives in `make dco`, single-sourced.
      - name: Check DCO sign-off (Signed-off-by on all commits)
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          if [ -z "$BASE" ]; then
            # On push to main, just check the HEAD commit. `-1 HEAD` is the
            # single-commit range equivalent of the PR BASE..HEAD below.
            make dco DCO_RANGE="-1 HEAD"
          else
            # checkout@v4 on pull_request lands on the ephemeral auto-generated
            # merge commit, whose message has no Signed-off-by. `make dco` uses
            # --no-merges to exclude that synthetic commit so only real
            # contributor commits are checked (otherwise DCO fails on every PR).
            make dco DCO_RANGE="$BASE..HEAD"
          fi

  # ── supply-chain: secret scanning ────────────────────────────────────────
  # Wardyn mints credentials; a committed secret is a critical supply-chain risk.
  # Full history is scanned so secrets introduced in any commit are caught. This
  # runs the gitleaks CLI directly via `gitleaks git` (NOT gitleaks-action): the
  # action's default scan range is only the triggering push/PR's diff even with
  # fetch-depth:0, which silently made the "full history" claim above false —
  # do not swap back to the action without also fixing its scan range. Accepted
  # test/dev-fixture secrets are allowlisted by commit fingerprint in
  # .gitleaksignore (gitleaks' native mechanism), not by broad path/regex.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Scan full git history for secrets with gitleaks
        run: make gitleaks

  # ── supply-chain: dependency license gate ─────────────────────────────────
  # Forbid copyleft / non-permissive Go dependencies.
  # The tree is currently all-permissive; this job enforces that invariant.
  # asciinema is a subprocess tool, not a Go dep, so it is not checked here.
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      # Checks BOTH tag sets. go-licenses has no -tags flag, so the docker-tagged
      # deps (moby/moby/*, containerd/errdefs) are covered by driving the tag via
      # GOFLAGS on the second pass inside the target (U112).
      - name: Check dependency licenses (tagless + -tags docker)
        run: make licenses

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - name: Check SPDX headers on source files
        run: ./scripts/check-license-headers.sh

  # ── supply-chain: SBOM + cosign (release stub) ────────────────────────────
  # This job is a clearly-marked stub. It produces a CycloneDX SBOM via syft
  # and shows where cosign signing would go in a real release pipeline.
  # It only runs on push to main (not on PRs) and does NOT upload to a registry.
  # Wire a real release workflow here when release automation is ready (v0.5).
  sbom-stub:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (CycloneDX JSON via syft, version pinned in the Makefile)
        run: make sbom
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wardyn-sbom
          path: wardyn-sbom.cdx.json
      # STUB: cosign signing goes here once a release key / keyless OIDC
      # identity is configured. Example:
      #   cosign sign-blob --yes wardyn-sbom.cdx.json
      - name: STUB — cosign signing not yet wired
        run: echo "SBOM generated. cosign signing is a v0.5 release-pipeline task."
