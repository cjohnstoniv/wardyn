{{/*
wardynd Deployment — the core object the chart was missing.

Honors values.yaml: image.*, replicas, resources, persistence, and the
postgres.dsn secret wiring. Env mirrors the compose demo (cmd/wardynd/main.go
flagEnv names): WARDYN_LISTEN sets the bind address, WARDYN_PG_DSN comes from a
Secret (external or chart-created), and WARDYN_AGE_KEY is sourced from the same
Secret only when present (otherwise wardynd generates an ephemeral key at boot —
the documented fail-closed default).

Hardening (defense in depth alongside the per-run sandbox envelope):
  - runs as a non-root user (the wardynd image is distroless:nonroot, uid 65532)
  - read-only root FS, all Linux capabilities dropped, no privilege escalation
  - liveness/readiness/startup probes on /healthz (wardynd serves it even when
    the admin token is unset — it is the one always-on endpoint)
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wardyn.fullname" . }}
  labels:
    {{- include "wardyn.labels" . | nindent 4 }}
spec:
  # wardynd is a single-writer control plane (Postgres is the source of truth);
  # the README documents replicas as the scaling knob.
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "wardyn.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wardyn.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "wardyn.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wardynd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -listen=:{{ .Values.service.port }}
          env:
            # DSN is the only required input; pulled from the (external or
            # chart-created) Secret so it never appears in the pod spec.
            - name: WARDYN_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "wardyn.secretName" . }}
                  key: {{ .Values.postgres.dsn.key }}
            {{- if .Values.secrets.ageKeyFromSecret }}
            # age secret-store identity (optional). Present only when the Secret
            # carries an "age-key" entry; otherwise wardynd self-generates one.
            - name: WARDYN_AGE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wardyn.secretName" . }}
                  key: age-key
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            # Generous startup budget so a slow first DB connect (migrations)
            # does not trip the liveness probe and crash-loop the pod.
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Read-only root FS needs writable scratch for any temp work.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            # Recording/audit spool when persistence is enabled. wardynd defaults
            # WARDYN_RECORDING_DIR to ./data/recordings; set it via .Values.env to
            # point inside this mount if you enable persistence.
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "wardyn.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "wardyn.fullname" . }}-data
  labels:
    {{- include "wardyn.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
