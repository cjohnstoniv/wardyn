{{/*
Default-deny NetworkPolicy for the wardynd pod, consistent with Wardyn's L0 egress
posture (deny-by-default; only explicitly-allowed flows pass). A bare
podSelector with empty Ingress/Egress rule arrays denies all traffic; we then
re-open only what wardynd needs:

  - DNS (UDP+TCP/53) so it can resolve Postgres and the OIDC issuer
  - egress to Postgres on .Values.networkPolicy.postgres.port
  - ingress to the HTTP port from the configured sources (default: same
    namespace, e.g. an ingress controller / the UI)

This is the L3/L4 complement to the wardyn-proxy sidecar's L2 allowlist noted in
values.yaml. On Cilium, layer a CiliumNetworkPolicy with toFQDN rules on top for
egress-by-domain; this plain NetworkPolicy is the portable baseline.
*/}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wardyn.fullname" . }}
  labels:
    {{- include "wardyn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wardyn.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingress.from }}
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
        {{- else }}
        # Default: allow ingress from any pod in the release namespace. Narrow
        # this to your ingress controller's namespace/pod selector in production.
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
  egress:
    # DNS resolution (kube-dns / CoreDNS).
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres. By default allow to any destination on the DB port (managed
    # Postgres is commonly out-of-cluster); restrict with networkPolicy.egress.extra.
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    {{- with .Values.networkPolicy.egress.extra }}
    # Operator-supplied additional egress rules (OIDC issuer, SIEM sinks, etc.).
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
