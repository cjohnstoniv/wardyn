{{/*
DSN / age-key Secret.

Finding wiring: the Deployment sources WARDYN_PG_DSN (and optionally WARDYN_AGE_KEY)
from a Secret. Two modes:

  1. External secret (recommended / production): set postgres.dsn.secretRef.name
     to a Secret you created out-of-band (see README "Database Setup"). The
     chart then references it and renders NO Secret of its own, so credentials
     never live in rendered manifests or Helm release history.

  2. Inline (demo): leave postgres.dsn.secretRef.name empty and supply
     postgres.dsn.value (and optionally secrets.ageKey). The chart creates
     "<fullname>-secrets". This is demo-grade — the DSN is base64 in the
     release; do not use for anything beyond a laptop.

The age key is the secret-store identity. Left empty, wardynd generates an
ephemeral key at boot (secrets do not survive a restart). For persistence,
supply secrets.ageKey from `age-keygen`. wardynd fails closed on the old
publicly-known demo key, so we never default one here.
*/}}
{{- if not .Values.postgres.dsn.secretRef.name -}}
{{- if not .Values.postgres.dsn.value -}}
{{- fail "wardyn: set either postgres.dsn.secretRef.name (external Secret) or postgres.dsn.value (inline demo DSN)" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wardyn.secretName" . }}
  labels:
    {{- include "wardyn.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgres.dsn.key }}: {{ .Values.postgres.dsn.value | quote }}
  {{- with .Values.secrets.ageKey }}
  age-key: {{ . | quote }}
  {{- end }}
{{- end -}}
