{{/*
ServiceAccount for wardynd. The Helm-blessed K8s path runs the control plane
under a dedicated identity (not "default") so the future RBAC roles
(RunPolicy/AgentRun CRDs, scoped sandbox creation per the compose file's
"production path … scoped RBAC" note) bind to a stable subject. Token
auto-mount is opt-out: wardynd does not call the API server in v0.x, so the
projected SA token is unnecessary attack surface.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wardyn.serviceAccountName" . }}
  labels:
    {{- include "wardyn.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end -}}
