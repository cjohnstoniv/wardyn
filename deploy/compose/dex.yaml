# Dex IdP config for the Wardyn compose demo. Dex config env-expansion is NOT
# used here: the client secret and the demo password hash are LITERALS in this
# file (see the staticClients note below). Enabling DEX_EXPAND_ENV would corrupt
# the bcrypt hash and, when off (the observed default), an injected
# ${DEX_CLIENT_SECRET} is never substituted — so both stay literal and must be
# kept in lockstep with docker-compose.yaml (WARDYN_OIDC_CLIENT_SECRET).
#
# Demo login: demo@wardyn.local / <DEX_DEMO_PASSWORD from .env, default "password">.
#
# Issuer is the PUBLIC, browser-facing URL (the browser is redirected here and
# the id_token "iss" claim carries it). wardynd reaches Dex server-side at the
# internal docker hostname http://dex:5556 (WARDYN_OIDC_INTERNAL_ISSUER) and
# transparently rewrites localhost:5556 -> dex:5556 for discovery/token/JWKS,
# so SSO works in the browser with no /etc/hosts edit.
issuer: http://localhost:5556

storage:
  type: memory

web:
  http: 0.0.0.0:5556

# Skip the approval screen so the demo flow is a single redirect.
oauth2:
  skipApprovalScreen: true

staticClients:
  - id: wardyn
    name: Wardyn
    # The client secret is a LITERAL, not ${DEX_CLIENT_SECRET}. Env expansion of
    # the Dex config is NOT reliably on in this image (DEX_EXPAND_ENV is unset and
    # the default did not substitute here), so an unexpanded "${DEX_CLIENT_SECRET}"
    # leaks through as the literal secret and every token exchange fails with
    # "invalid client_secret". We also cannot simply turn expansion ON: that would
    # corrupt the bcrypt password hash below (its $2a$/$10$ segments look like
    # undefined vars — the same gotcha documented for the hash). So BOTH secrets
    # are literals. This must match WARDYN_OIDC_CLIENT_SECRET in docker-compose.yaml
    # (default "wardyn-oidc-secret"). To rotate, change both in lockstep.
    secret: wardyn-oidc-secret
    redirectURIs:
      - http://localhost:8080/auth/callback

enablePasswordDB: true
staticPasswords:
  # Demo credential: demo@wardyn.local / "password".
  #
  # The hash is a LITERAL (not ${ENV}) on purpose: Dex re-expands ${...} in the
  # config after substitution, and a bcrypt hash contains '$' segments ($2a$10$)
  # that Dex would treat as undefined variables and strip — corrupting the hash.
  # Keeping it literal sidesteps that. To change the demo password, regenerate
  # the bcrypt hash and paste it here.
  - email: "demo@wardyn.local"
    hash: "$2a$10$SDMtAYUgJDDzcanSySsoBuLPINvmRvxVpqg3WU9jfThQABkwBvaiK"
    username: "demo"
    userID: "demo-0001"
