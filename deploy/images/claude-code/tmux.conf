# Wardyn attach: make tmux a transparent, PERSISTENT shell host.
#
# The attach terminal runs `tmux new-session -A -s wardyn bash` so the session
# survives WebSocket detaches (tab switches, refreshes, drops). This config
# keeps tmux invisible so it behaves like a plain shell in the browser xterm:
#
#   - status off: no bottom status bar (it otherwise renders as stray bars /
#     line-drawing artifacts in xterm.js — the "__" the operator saw).
#   - sane terminfo + truecolor passthrough so prompts/TUIs (claude) render.
#   - mouse on for scroll/select; large scrollback; snappy ESC for TUIs.
set -g status off
# Mouse OFF: in a browser xterm, tmux mouse-capture hijacks native
# selection/copy and (with paste) caused pane-splits. With it off, the browser
# handles select/copy/paste normally and the scroll wheel scrolls xterm's own
# buffer. tmux history is still reachable via copy-mode (prefix + [).
set -g mouse off
set -g history-limit 50000
set -s escape-time 0
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:Tc"
# Don't rename the window from program titles (keeps things quiet with no bar).
set -g allow-rename off
setw -g automatic-rename off
